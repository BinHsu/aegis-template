name: Security Checks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily baseline run

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Practice 5: secret-residue scan (real, runnable) ──
      - name: Cleanup scanner (secrets / .env residue)
        run: python3 scripts/cleanup-scanner.py

      # ── Practice 4: promoted pattern checks (semgrep) ──
      - name: Semgrep (promoted review rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep/

      # ── Practice 7: tool-registry audit ──
      - name: Tool-registry audit
        run: |
          if command -v yq >/dev/null 2>&1 && [ -f tools/registry.yaml ]; then
            bash scripts/audit-tool-registry.sh
          else
            echo "yq or registry not present — skipping (install yq to enable)"
          fi

      # ── Practice 5: security benchmark ──
      - name: Security benchmark
        run: python3 scripts/security-benchmark.py

      # ── Dependency audit — wire per stack (uncomment the matching one) ──
      # - run: npm audit --audit-level=high
      # - run: pip-audit --strict
      # - run: cargo audit --deny warnings
      # - run: govulncheck ./...

      # ── Lint with security rules — wire per stack ──
      # - run: npm run lint
      # - run: ruff check . && mypy .
      # - run: golangci-lint run
